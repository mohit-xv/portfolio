<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mohit Singh — Cloud Cost Optimisation">
  <rect width="1200" height="630" fill="#0D0B09"/>

  <!-- Grain layer -->
  <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="1200" height="630" filter="url(#g)" opacity="0.04"/>

  <!-- Gold rule top -->
  <rect x="80" y="80" width="120" height="1" fill="#C0A062" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="80" y="140" font-family="Georgia, serif" font-size="14" letter-spacing="6" fill="#C0A062" opacity="0.7" text-anchor="start" font-style="normal">MOHIT SINGH</text>

  <!-- Headline -->
  <text x="80" y="340" font-family="Georgia, serif" font-size="80" font-weight="300" fill="#EDE4D3" letter-spacing="-2">Pay for compute,</text>
  <text x="80" y="440" font-family="Georgia, serif" font-size="80" font-weight="300" fill="#EDE4D3" letter-spacing="-2">not </text>
  <text x="226" y="440" font-family="Georgia, serif" font-size="80" font-weight="300" fill="#E3C27D" letter-spacing="-2" font-style="italic">waste</text>
  <text x="466" y="440" font-family="Georgia, serif" font-size="80" font-weight="300" fill="#EDE4D3" letter-spacing="-2">.</text>

  <!-- Subline -->
  <text x="80" y="520" font-family="Courier New, monospace" font-size="14" letter-spacing="4" fill="#C0A062" opacity="0.65">CLOUD COST OPTIMISATION · DEVOPS · 5× AWS CERTIFIED</text>

  <!-- Gold rule bottom -->
  <rect x="80" y="560" width="120" height="1" fill="#C0A062" opacity="0.4"/>
</svg>
